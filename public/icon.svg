<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="discordGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5865F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4752C4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond -->
  <rect width="512" height="512" rx="120" fill="url(#discordGradient)"/>
  
  <!-- Logo Discord simplifié -->
  <g transform="translate(256, 256)">
    <!-- Tête principale -->
    <ellipse cx="0" cy="-30" rx="80" ry="90" fill="#ffffff" opacity="0.95"/>
    
    <!-- Oreilles -->
    <path d="M -60 -80 Q -80 -60 -70 -30 L -50 -40 Q -55 -60 -60 -80" fill="#ffffff" opacity="0.95"/>
    <path d="M 60 -80 Q 80 -60 70 -30 L 50 -40 Q 55 -60 60 -80" fill="#ffffff" opacity="0.95"/>
    
    <!-- Yeux -->
    <circle cx="-25" cy="-40" r="8" fill="#2F3136"/>
    <circle cx="25" cy="-40" r="8" fill="#2F3136"/>
    
    <!-- Bouche -->
    <path d="M -20 -10 Q 0 5 20 -10" stroke="#2F3136" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Petites dents -->
    <rect x="-5" y="-8" width="4" height="6" fill="#ffffff" opacity="0.8"/>
    <rect x="1" y="-8" width="4" height="6" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Effet de brillance -->
  <ellipse cx="150" cy="100" rx="60" ry="40" fill="#ffffff" opacity="0.2"/>
</svg>
